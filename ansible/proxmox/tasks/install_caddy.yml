---
- name: Check if Caddy binary exists
  ansible.builtin.stat:
    path: /usr/bin/caddy
  register: caddy_bin_stat

- name: Download Caddy with Cloudflare DNS plugin
  ansible.builtin.get_url:
    url: https://caddyserver.com/api/download?os=linux&arch=amd64&p=github.com%2Fcaddy-dns%2Fcloudflare
    dest: /usr/bin/caddy
    mode: "0755"
  when: not caddy_bin_stat.stat.exists
  register: caddy_downloaded

- name: Create caddy group
  ansible.builtin.group:
    name: caddy
    system: true

- name: Create caddy user
  ansible.builtin.user:
    name: caddy
    group: caddy
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/caddy
    create_home: true

- name: Create Caddy config directory
  ansible.builtin.file:
    path: /etc/caddy
    state: directory
    mode: "0755"

- name: Deploy Caddyfile
  ansible.builtin.copy:
    dest: /etc/caddy/Caddyfile
    content: |
      pve.seagram.cloud {
        reverse_proxy https://localhost:8006 {
          transport http {
            tls_insecure_skip_verify
          }
        }
        tls {
          dns cloudflare {env.CLOUDFLARE_API_TOKEN}
        }
      }
    mode: "0644"
    backup: true
  register: caddyfile_updated

- name: Deploy Caddy systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/caddy.service
    content: |
      [Unit]
      Description=Caddy
      After=network.target network-online.target
      Requires=network-online.target

      [Service]
      Type=notify
      User=caddy
      Group=caddy
      ExecStart=/usr/bin/caddy run --environ --config /etc/caddy/Caddyfile
      ExecReload=/usr/bin/caddy reload --config /etc/caddy/Caddyfile --force
      TimeoutStopSec=5s
      LimitNOFILE=1048576
      Environment=CLOUDFLARE_API_TOKEN={{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}
      AmbientCapabilities=CAP_NET_BIND_SERVICE

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  register: caddy_service_updated

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  when: caddy_service_updated is changed

- name: Enable and restart Caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: restarted
