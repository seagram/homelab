repositories:
  - name: grafana
    url: https://grafana.github.io/helm-charts

releases:
  - name: loki
    namespace: loki
    chart: grafana/loki
    createNamespace: false  # namespace.yaml manages the namespace
    wait: true
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "namespace.yaml"]
    values:
      - values.yaml
