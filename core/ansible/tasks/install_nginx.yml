---
- name: Install nginx and certbot
  ansible.builtin.apt:
    name:
      - nginx
      - certbot
      - python3-certbot-dns-cloudflare
    state: present
    update_cache: true

- name: Create certbot credentials directory
  ansible.builtin.file:
    path: /etc/letsencrypt
    state: directory
    mode: "0700"

- name: Deploy Cloudflare credentials for certbot
  ansible.builtin.copy:
    dest: /etc/letsencrypt/cloudflare.ini
    content: |
      dns_cloudflare_api_token = {{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}
    mode: "0600"

- name: Obtain Let's Encrypt certificate via DNS-01
  ansible.builtin.command:
    cmd: >
      certbot certonly
      --dns-cloudflare
      --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini
      --domain {{ lookup('env', 'PROXMOX_DOMAIN') }}
      --non-interactive
      --agree-tos
      --email {{ lookup('env', 'CERTBOT_EMAIL') }}
    creates: /etc/letsencrypt/live/{{ lookup('env', 'PROXMOX_DOMAIN') }}/fullchain.pem

- name: Get Tailscale IP
  ansible.builtin.command: tailscale ip -4
  changed_when: false
  register: tailscale_ip

- name: Deploy nginx reverse proxy config
  ansible.builtin.copy:
    dest: /etc/nginx/sites-available/pve.conf
    content: |
      server {
          listen {{ tailscale_ip.stdout }}:443 ssl;
          server_name {{ lookup('env', 'PROXMOX_DOMAIN') }};

          ssl_certificate /etc/letsencrypt/live/{{ lookup('env', 'PROXMOX_DOMAIN') }}/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/{{ lookup('env', 'PROXMOX_DOMAIN') }}/privkey.pem;

          location / {
              proxy_pass https://localhost:8006;
              proxy_ssl_verify off;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
          }
      }
    mode: "0644"
  register: nginx_config_updated

- name: Create nginx override directory
  ansible.builtin.file:
    path: /etc/systemd/system/nginx.service.d
    state: directory
    mode: "0755"

- name: Ensure nginx starts after Tailscale IP is ready
  ansible.builtin.copy:
    dest: /etc/systemd/system/nginx.service.d/after-tailscale.conf
    content: |
      [Unit]
      After=tailscaled.service network-online.target
      Wants=tailscaled.service network-online.target

      [Service]
      ExecStartPre=/bin/sh -c 'for i in $(seq 1 30); do tailscale ip -4 >/dev/null 2>&1 && exit 0; sleep 1; done; exit 1'
    mode: "0644"
  register: nginx_override

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  when: nginx_override is changed

- name: Enable site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/pve.conf
    dest: /etc/nginx/sites-enabled/pve.conf
    state: link

- name: Remove default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Test nginx config
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Enable and restart nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: restarted
  when: nginx_config_updated is changed
