---
- name: Install Tailscale
  hosts: proxmox-ssh
  become: true
  tasks:
    # Note: ensure to run PVE post-install script before playbook.
    # Source: https://community-scripts.github.io/ProxmoxVE/scripts?id=post-pve-install
    # Note: ensure to run PVE CPU Scaling Governor script (set to 'powersave') before playbook.
    # Source: https://community-scripts.github.io/ProxmoxVE/scripts?id=scaling-governor
    - import_tasks: tasks/install_tailscale.yml
      tags: tailscale

- name: Configure Proxmox
  hosts: proxmox-tailscale
  become: true
  tasks:
    - import_tasks: tasks/apt_update.yml
      tags: apt
    - import_tasks: tasks/harden_ssh.yml
      tags: ssh
    - import_tasks: tasks/install_nginx.yml
      tags: nginx
    - import_tasks: tasks/disable_poweroff.yml
      tags: poweroff
