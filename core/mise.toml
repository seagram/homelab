[tools]
ansible-core = "latest"
terraform = "latest"

[env]
_.file = ".env"

# ansible
PROXMOX_IP = { required = "Proxmox host IP address" }
PROXMOX_DOMAIN = { required = "FQDN for proxmox (e.g. pve.example.com)" }
PROXMOX_SUBDOMAIN = { required = "Subdomain for proxmox DNS record (e.g. pve)" }
ADMIN_PASSWORD = { required = true, redact = true }
TAILSCALE_AUTH_KEY = { required = true, redact = true }
CLOUDFLARE_API_TOKEN = { required = "Zone:DNS:Edit permissions needed", redact = true }
CERTBOT_EMAIL = { required = "Email for Let's Encrypt registration" }

# terraform
# note 'TF_VAR_' prefix auto-maps to terraform variables
TF_VAR_proxmox_subdomain = "{{env.PROXMOX_SUBDOMAIN}}"
TF_VAR_cloudflare_zone_id = { required = true, redact = true }
TF_VAR_tailscale_magic_dns_domain = { required = true, redact = true }

[tasks.bootstrap]
run = """
cd ansible && ansible-playbook site.yml \
  --tags repos,admin,tailscale \
  -e ansible_host=$PROXMOX_IP \
  -e ansible_user=root \
  -e ansible_ssh_pass=$ADMIN_PASSWORD
"""
description = "First-run bootstrap: create admin user and install tailscale via SSH"

[tasks.configure-proxmox]
run = "cd ansible && ansible-playbook site.yml"
description = "Run all proxmox configuration tasks"

[tasks.deploy-dns]
run = "cd terraform/cloudflare && terraform init && terraform apply"
description = "Deploy cloudflare DNS records"
