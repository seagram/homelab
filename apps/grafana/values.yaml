datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        url: http://loki.loki.svc.cluster.local:3100
        access: proxy
        isDefault: false

persistence:
  enabled: false

database:
  type: postgres
  host: grafana-postgres-rw.grafana.svc.cluster.local:5432
  name: grafana
  user: grafana
  passwordSecret: grafana-postgres-app
  passwordKey: password
  sslmode: disable
